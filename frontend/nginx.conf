# Plantilla nginx para la SPA. La imagen oficial nginx ejecuta envsubst sobre
# este archivo y solo sustituye variables que existen como env (aquí ${PORT}),
# dejando intactas las variables propias de nginx ($uri, etc.).
server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: la app es React de una sola página (sin React Router); cualquier
    # ruta desconocida sirve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre → cache agresivo.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
